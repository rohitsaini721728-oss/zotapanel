<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title> ZOTA PANEL-LOGIN</title>
   <link href="https://googleapis.com" rel="stylesheet">
 <style>/* --- Global Reset & Base Styles --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle, #4a75b3 0%, #29426f 100%);
            padding: 40px 20px;
            position: relative; 
            overflow-x: hidden;
        }

        /* --- Panel Visibility Controls --- */
        .form-panel {
            display: none; /* Hidden by default */
            width: 100%;
            max-width: 400px;
            animation: fadeIn 0.4s ease forwards;
        }

        .form-panel.active {
            display: block; /* Only show the active panel */
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- CORNER LOGO CONTAINER --- */
        .logo-container {
            position: absolute; 
            top: 20px;       
            left: 20px;      
            width: 60px;        
            height: 60px;       
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;    
        }

        /* Central Letter Z */
        .letter-z {
            color: #ffffff;
            font-size: 18px;    
            font-weight: 900;
            font-family: 'Arial Black', sans-serif;
            position: absolute;
            user-select: none;
            z-index: 10;
            animation: pulseGlow 2s ease-in-out infinite alternate;
        }

        /* Shared Ring Properties */
        .ring {
            position: absolute;
            border-radius: 50%;
            border: 2px dashed transparent; 
        }

        /* Inner Blue Ring */
        .ring-inner {
            width: 34px;        
            height: 34px;       
            border-top-color: #0095ff;
            border-bottom-color: #0095ff;
            filter: drop-shadow(0 0 2px rgba(0, 149, 255, 0.8));
            animation: rotateClockwise 2.5s linear infinite;
        }

        /* Outer Green Ring */
        .ring-outer {
            width: 45px;        
            height: 45px;       
            border-left-color: #10b981;
            border-right-color: #10b981;
            filter: drop-shadow(0 0 2px rgba(16, 185, 129, 0.8));
            animation: rotateCounterClockwise 3.5s linear infinite;
        }

        /* Ultra-Thin Outermost Tech Ring */
        .ring-ambient {
            width: 55px;        
            height: 55px;       
            border: 1px dotted rgba(236, 72, 153, 0.4);
            border-top-color: #ec4899;
            filter: drop-shadow(0 0 1px rgba(236, 72, 153, 0.6));
            animation: rotateClockwise 5s linear infinite;
        }

        /* Orbiting Particle Accents */
        .particle-orbit {
            position: absolute;
            width: 63px;        
            height: 63px;       
            animation: rotateClockwise 4.5s linear infinite;
        }

        .particle {
            position: absolute;
            width: 2px;         
            height: 2px;
            border-radius: 50%;
        }

        .p1 { top: 0; left: 50%; transform: translateX(-50%); background-color: #0095ff; box-shadow: 0 0 3px #0095ff;}
        .p2 { bottom: 0; left: 50%; transform: translateX(-50%); background-color: #10b981; box-shadow: 0 0 3px #10b981;}

        /* --- Login Container --- */
        .login-container {
            background: linear-gradient(135deg, #375b94 0%, #294473 100%);
            width: 100%;
            padding: 40px 35px 35px 35px;
            border-radius: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3),
                        inset 0 1px 2px rgba(255, 255, 255, 0.2);
            text-align: center;
            position: relative;
            margin-top: 65px; 
            margin-bottom: 110px; 
        }

        /* --- Login Avatar --- */
        .login-container .avatar-container {
            position: absolute;
            top: -65px;
            left: 50%;
            transform: translateX(-50%);
            width: 130px;
            height: 130px;
            background: linear-gradient(135deg, #4974b2 0%, #2b4575 100%);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
        }

        .avatar {
            width: 116px;
            height: 116px;
            background: linear-gradient(to bottom, #a0c2e9, #6d93c4);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            overflow: hidden;
        }

        .avatar svg {
            width: 75%;
            height: 75%;
            color: #e2edf9;
            opacity: 0.85;
            margin-bottom: -5px;
        }

        /* --- Typography & Headings --- */
        h2 {
            color: #ffffff;
            font-size: 1.3rem;
            font-weight: 500;
            letter-spacing: 1px;
            margin-top: 55px;
            margin-bottom: 30px;
        }

        /* --- Form Input Fields --- */
        .input-group {
            margin-bottom: 18px;
        }

        .input-group input {
            width: 100%;
            padding: 16px 20px;
            background: transparent;
            border: 2px solid rgba(255, 255, 255, 0.7);
            border-radius: 12px;
            color: #ffffff;
            font-size: 0.95rem;
            letter-spacing: 0.5px;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-group input::placeholder {
            color: rgba(255, 255, 255, 0.65);
            font-size: 0.85rem;
        }

        .input-group input:focus {
            border-color: #ffffff;
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 0 8px rgba(255, 255, 255, 0.2);
        }

        /* --- Login Button --- */
        .login-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(to bottom, #a0c3ea, #8cb0db);
            border: none;
            border-radius: 25px;
            color: #2b4573;
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 1px;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.15);
            transition: all 0.3s ease;
        }

        .login-btn:hover {
            background: linear-gradient(to bottom, #b3d1f5, #9ebcdc);
            transform: translateY(-1px);
            box-shadow: 0 7px 18px rgba(0, 0, 0, 0.2);
        }

        /* --- Custom Checkbox --- */
        .remember-me {
            margin-top: 25px;
            display: flex;
            justify-content: center;
        }

        .remember-me label {
            color: rgba(255, 255, 255, 0.85);
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            cursor: pointer;
            user-select: none;
        }

        .remember-me input {
            position: absolute;
            opacity: 0;
            cursor: pointer;
            height: 0;
            width: 0;
        }

        .custom-checkbox {
            position: relative;
            display: inline-block;
            height: 20px;
            width: 20px;
            border: 2px solid rgba(255, 255, 255, 0.8);
            border-radius: 4px;
            margin-right: 10px;
            transition: all 0.2s ease;
        }

        .remember-me input:checked ~ .custom-checkbox {
            background-color: transparent;
            border-color: #ffffff;
        }

        .custom-checkbox::after {
            content: "";
            position: absolute;
            display: none;
            left: 5px;
            top: 1px;
            width: 5px;
            height: 10px;
            border: solid #ffffff;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
        }

        .remember-me input:checked ~ .custom-checkbox::after {
            display: block;
        }

        /* --- Bottom External Links --- */
        .extra-links {
            position: absolute;
            bottom: -110px;
            left: 0;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
        }

        .forgot-password {
            color: rgba(255, 255, 255, 0.75);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s;
        }

        .forgot-password:hover {
            color: #ffffff;
        }

        .signup-text {
            color: rgba(255, 255, 255, 0.65);
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }

        .signup-text a {
            color: #5ce1e6;
            text-decoration: none;
            font-weight: 600;
            margin-left: 5px;
            transition: color 0.2s;
        }

        .signup-text a:hover {
            color: #ffffff;
        }

        /* --- Signup Container Layout --- */
        .signup-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            margin-top: 65px;
        }

        /* Signup Avatar Icon */
        .signup-container .avatar-container {
            width: 130px;
            height: 130px;
            background: linear-gradient(135deg, #4974b2 0%, #2b4575 100%);
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.2);
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: -65px; 
            z-index: 2;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        }

        .avatar-icon {
            width: 70px;
            height: 70px;
            fill: #e2edf9;
            opacity: 0.85;
        }

        /* Signup Form Card */
        .card {
            background: linear-gradient(135deg, #375b94 0%, #294473 100%);
            width: 100%;
            padding: 85px 35px 35px 35px; 
            border-radius: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3),
                        inset 0 1px 2px rgba(255, 255, 255, 0.2);
            text-align: center;
            z-index: 1;
        }

        .card h2 {
            margin-top: 0;
            margin-bottom: 30px;
        }

        /* Terms Checkbox */
        .terms-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 25px;
            color: rgba(255, 255, 255, 0.85);
            font-size: 0.9rem;
        }

        .terms-container input[type="checkbox"] {
            accent-color: #79a1db;
            cursor: pointer;
            width: 15px;
            height: 15px;
        }

        /* Submit Button */
        .btn-submit {
            width: 100%;
            padding: 15px;
            background: linear-gradient(to bottom, #a0c3ea, #8cb0db);
            border: none;
            border-radius: 25px;
            color: #2b4573;
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 1px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.15);
            transition: all 0.3s ease;
        }

        .btn-submit:hover {
            background: linear-gradient(to bottom, #b3d1f5, #9ebcdc);
            transform: translateY(-1px);
        }

        /* Navigation Links */
        .bottom-text {
            margin-top: 30px;
            color: rgba(255, 255, 255, 0.65);
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }

        .bottom-text a {
            color: #5ce1e6;
            text-decoration: none;
            font-weight: 600;
            margin-left: 5px;
            transition: color 0.2s;
        }

        .bottom-text a:hover {
            color: #ffffff;
        }

        /* Animation Keyframes */
        @keyframes rotateClockwise {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes rotateCounterClockwise {
            0% { transform: rotate(360deg); }
            100% { transform: rotate(0deg); }
        }

        @keyframes pulseGlow {
            0% {
                transform: scale(0.96);
                text-shadow: 0 0 4px rgba(0, 149, 255, 0.6), 0 0 8px rgba(0, 149, 255, 0.2);
            }
            100% {
                transform: scale(1.04);
                text-shadow: 0 0 6px rgba(0, 149, 255, 0.9), 0 0 12px rgba(16, 185, 129, 0.6);
            }
        }
       /* Elegant In-Form Notification Style */
    .form-alert {
        display: none;
        background: rgba(255, 74, 74, 0.15);
        border: 1px solid #ff4a4a;
        color: #ff4a4a;
        padding: 12px;
        border-radius: 8px;
        text-align: center;
        font-family: 'Poppins', sans-serif;
        font-size: 14px;
        margin-bottom: 20px;
        animation: fadeIn 0.4s ease-in-out;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>
</head>
<body>
   <div class="logo-container">
        <div class="particle-orbit">
            <div class="particle p1"></div>
            <div class="particle p2"></div>
        </div>
        <div class="ring ring-ambient"></div>
        <div class="ring ring-outer"></div>
        <div class="ring ring-inner"></div>
        <div class="letter-z">Z</div>
    </div>

    <!-- LOGIN PANEL -->
    <div id="loginPanel" class="form-panel active">
        <div class="login-container">
            <div class="avatar-container">
                <div class="avatar">
                    <svg viewBox="0 0 100 100" fill="currentColor">
                        <path d="M50 50c11 0 20-9 20-20s-9-20-20-20-20 9-20 20 9 20 20 20zm0 8c-13.3 0-40 6.7-40 20v6h80v-6c0-13.3-26.7-20-40-20z"/>
                    </svg>
                </div>
            </div>

            <h2>USER LOGIN</h2>

            <!-- Elegant Logout Success Notification Box -->
            <div id="logoutSuccess" class="form-alert" style="background: rgba(46, 204, 113, 0.15); border: 1px solid #2ecc71; color: #2ecc71;">
                Logged out successfully.
            </div>

            <!-- Elegant Popup Target Window -->
            <div id="loginError" class="form-alert"></div>

            <form id="loginForm">
                <div class="input-group">
                    <input type="text" id="username" placeholder="USERNAME" required autocomplete="off">
                </div>
                
                <div class="input-group">
                    <input type="password" id="password" placeholder="PASSWORD" required>
                </div>

                <button type="submit" class="login-btn">LOGIN</button>

                <div class="remember-me">
                    <label>
                        <input type="checkbox" checked>
                        <span class="custom-checkbox"></span>
                        Remember me
                    </label>
                </div>
            </form>

            <div class="extra-links">
                <a href="#" class="forgot-password">Forgot password?</a>
                <p class="signup-text">Not a member? <a href="#" id="toSignup">CREATE ACCOUNT</a></p>
            </div>
        </div>
    </div>

    <!-- SIGNUP PANEL -->
    <div id="signupPanel" class="form-panel">
        <div class="signup-container">
            <div class="avatar-container">
                <svg class="avatar-icon" viewBox="0 0 24 24" style="width: 50px; height: 50px; fill: currentColor;">
                    <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                </svg>
            </div>

            <div class="card">
                <h2>SIGN UP</h2>
                <form>
                    <div class="input-group">
                        <input type="text" placeholder="FULL NAME" required>
                    </div>
                    <div class="input-group">
                        <input type="email" placeholder="EMAIL ADDRESS" required>
                    </div>
                    <div class="input-group">
                        <input type="password" placeholder="PASSWORD" required>
                    </div>
                    <div class="input-group">
                        <input type="password" placeholder="CONFIRM PASSWORD" required>
                    </div>

                    <div class="terms-container">
                        <input type="checkbox" id="terms" required>
                        <label for="terms">I agree to the Terms & Conditions</label>
                    </div>

                    <button type="submit" class="btn-submit">SIGN UP</button>
                </form>

                <p class="bottom-text">Already a member? <a href="#" id="toLogin">LOGIN</a></p>
            </div>
        </div>
    </div>

<script>
  // --- 1. DOM ELEMENT REFERENCES --- 
const loginPanel = document.getElementById('loginPanel');
const signupPanel = document.getElementById('signupPanel');
const toSignupLink = document.getElementById('toSignup');
const toLoginLink = document.getElementById('toLogin');

const loginForm = document.getElementById('loginForm');
const usernameInput = document.getElementById('username');
const passwordInput = document.getElementById('password');
const rememberMeCheckbox = document.querySelector('.remember-me input[type="checkbox"]');
const errorBox = document.getElementById('loginError');
const logoutAlert = document.getElementById('logoutSuccess');

// --- 2. REMEMBER ME INITIALIZATION ENGINE ---
// Runs instantly on window load to check for stored credentials
window.addEventListener('DOMContentLoaded', function() {
    const savedUsername = localStorage.getItem('zota_remembered_user');
    
    if (savedUsername) {
        usernameInput.value = savedUsername;
        rememberMeCheckbox.checked = true;
        // Optional: Move focus directly to password field if username is saved
        passwordInput.focus();
    } else {
        rememberMeCheckbox.checked = false;
    }
});


  
// --- 3. PANEL NAVIGATION CONTROLS ---
toSignupLink.addEventListener('click', function(e) {
    e.preventDefault();
    loginPanel.classList.remove('active');
    signupPanel.classList.add('active');
    errorBox.style.display = 'none';
    logoutAlert.style.display = 'none';
});

toLoginLink.addEventListener('click', function(e) {
    e.preventDefault();
    signupPanel.classList.remove('active');
    loginPanel.classList.add('active');
});

// --- 4. FORM AUTHENTICATION & PROCESSING ---
loginForm.addEventListener('submit', function(e) {
    e.preventDefault();

    const enteredUsername = usernameInput.value.trim();
    const enteredPassword = passwordInput.value;

    if (enteredUsername === "admin" && enteredPassword === "admin123") {
        errorBox.style.display = "none";
        
        // Handle "Remember Me" local persistence check
        if (rememberMeCheckbox.checked) {
            localStorage.setItem('zota_remembered_user', enteredUsername);
        } else {
            localStorage.removeItem('zota_remembered_user');
        }
        
        // Set short-term dashboard session protection token
        sessionStorage.setItem("zota_session_active", "true");
        
        // Redirect to protected dashboard view
        window.location.href = "login.html"; 
    } else {
        errorBox.innerText = "Access Denied: Invalid username or password.";
        errorBox.style.display = "block";
        logoutAlert.style.display = 'none';
    }
});

// --- 5. LOGOUT ALERTS ENGINE ---
window.addEventListener('DOMContentLoaded', function() {
    const urlParams = new URLSearchParams(window.location.search);
    
    if (urlParams.get('logout') === 'success') {
        logoutAlert.style.display = 'block';
        
        // Clean URL parameter trace instantly
        const cleanUrl = window.location.protocol + "//" + window.location.host + window.location.pathname;
        window.history.replaceState({ path: cleanUrl }, '', cleanUrl);
        
        // Fade notification after 4 seconds
        setTimeout(function() {
            logoutAlert.style.transition = "opacity 0.5s ease";
            logoutAlert.style.opacity = "0";
            setTimeout(() => logoutAlert.style.display = 'none', 500);
        }, 4000);
    } else {
        logoutAlert.style.display = 'none';
    }
});
</script>
</body>
</html>
