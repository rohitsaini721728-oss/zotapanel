<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title> ZOTA PANEL LOGIN</title>
   <link href="https://googleapis.com" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  
  <style>
    /* Elegant In-Form Notification Style */
    .form-alert {
        display: none;
        background: rgba(255, 74, 74, 0.15);
        border: 1px solid #ff4a4a;
        color: #ff4a4a;
        padding: 12px;
        border-radius: 8px;
        text-align: center;
        font-family: 'Poppins', sans-serif;
        font-size: 14px;
        margin-bottom: 20px;
        animation: fadeIn 0.4s ease-in-out;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
   <div class="logo-container">
        <div class="particle-orbit">
            <div class="particle p1"></div>
            <div class="particle p2"></div>
        </div>
        <div class="ring ring-ambient"></div>
        <div class="ring ring-outer"></div>
        <div class="ring ring-inner"></div>
        <div class="letter-z">Z</div>
    </div>

    <!-- LOGIN PANEL -->
    <div id="loginPanel" class="form-panel active">
        <div class="login-container">
            <div class="avatar-container">
                <div class="avatar">
                    <svg viewBox="0 0 100 100" fill="currentColor">
                        <path d="M50 50c11 0 20-9 20-20s-9-20-20-20-20 9-20 20 9 20 20 20zm0 8c-13.3 0-40 6.7-40 20v6h80v-6c0-13.3-26.7-20-40-20z"/>
                    </svg>
                </div>
            </div>

            <h2>USER LOGIN</h2>

            <!-- Elegant Logout Success Notification Box -->
            <div id="logoutSuccess" class="form-alert" style="background: rgba(46, 204, 113, 0.15); border: 1px solid #2ecc71; color: #2ecc71;">
                Logged out successfully.
            </div>

            <!-- Elegant Popup Target Window -->
            <div id="loginError" class="form-alert"></div>

            <form id="loginForm">
                <div class="input-group">
                    <input type="text" id="username" placeholder="USERNAME" required autocomplete="off">
                </div>
                
                <div class="input-group">
                    <input type="password" id="password" placeholder="PASSWORD" required>
                </div>

                <button type="submit" class="login-btn">LOGIN</button>

                <div class="remember-me">
                    <label>
                        <input type="checkbox" checked>
                        <span class="custom-checkbox"></span>
                        Remember me
                    </label>
                </div>
            </form>

            <div class="extra-links">
                <a href="#" class="forgot-password">Forgot password?</a>
                <p class="signup-text">Not a member? <a href="#" id="toSignup">CREATE ACCOUNT</a></p>
            </div>
        </div>
    </div>

    <!-- SIGNUP PANEL -->
    <div id="signupPanel" class="form-panel">
        <div class="signup-container">
            <div class="avatar-container">
                <svg class="avatar-icon" viewBox="0 0 24 24" style="width: 50px; height: 50px; fill: currentColor;">
                    <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                </svg>
            </div>

            <div class="card">
                <h2>SIGN UP</h2>
                <form>
                    <div class="input-group">
                        <input type="text" placeholder="FULL NAME" required>
                    </div>
                    <div class="input-group">
                        <input type="email" placeholder="EMAIL ADDRESS" required>
                    </div>
                    <div class="input-group">
                        <input type="password" placeholder="PASSWORD" required>
                    </div>
                    <div class="input-group">
                        <input type="password" placeholder="CONFIRM PASSWORD" required>
                    </div>

                    <div class="terms-container">
                        <input type="checkbox" id="terms" required>
                        <label for="terms">I agree to the Terms & Conditions</label>
                    </div>

                    <button type="submit" class="btn-submit">SIGN UP</button>
                </form>

                <p class="bottom-text">Already a member? <a href="#" id="toLogin">LOGIN</a></p>
            </div>
        </div>
    </div>

<script>
    // Panel Toggle Navigation Links
    const loginPanel = document.getElementById('loginPanel');
    const signupPanel = document.getElementById('signupPanel');
    const toSignupLink = document.getElementById('toSignup');
    const toLoginLink = document.getElementById('toLogin');

    toSignupLink.addEventListener('click', function(e) {
        e.preventDefault();
        loginPanel.classList.remove('active');
        signupPanel.classList.add('active');
        document.getElementById('loginError').style.display = 'none';
        document.getElementById('logoutSuccess').style.display = 'none';
    });

    toLoginLink.addEventListener('click', function(e) {
        e.preventDefault();
        signupPanel.classList.remove('active');
        loginPanel.classList.add('active');
    });

    // Custom Validation & Redirection Engine
    const loginForm = document.getElementById('loginForm');
    const usernameInput = document.getElementById('username');
    const passwordInput = document.getElementById('password');
    const errorBox = document.getElementById('loginError');

    loginForm.addEventListener('submit', function(e) {
        e.preventDefault();

        const enteredUsername = usernameInput.value.trim();
        const enteredPassword = passwordInput.value;

        // Check if the credentials are exactly right
        if (enteredUsername === "admin" && enteredPassword === "admin123") {
            errorBox.style.display = "none";
            
            // Set the active session token
            sessionStorage.setItem("zota_session_active", "true");
            
            // Redirect to dashboard
            window.location.href = "dashboard.html"; 
        } else {
            // Display internal CSS error block
            errorBox.innerText = "Access Denied: Invalid username or password.";
            errorBox.style.display = "block";
            document.getElementById('logoutSuccess').style.display = 'none';
        }
    });

    // Detect if user just logged out to show success message
    window.addEventListener('DOMContentLoaded', function() {
        const urlParams = new URLSearchParams(window.location.search);
        const logoutAlert = document.getElementById('logoutSuccess');
        
        if (urlParams.get('logout') === 'success') {
            logoutAlert.style.display = 'block';
            
            // Clean up the URL link bar
            const cleanUrl = window.location.protocol + "//" + window.location.host + window.location.pathname;
            window.history.replaceState({ path: cleanUrl }, '', cleanUrl);
            
            // Fade out after 4 seconds
            setTimeout(function() {
                logoutAlert.style.transition = "opacity 0.5s ease";
                logoutAlert.style.opacity = "0";
                setTimeout(() => logoutAlert.style.display = 'none', 500);
            }, 4000);
        } else {
            logoutAlert.style.display = 'none';
        }
    });
</script>
</body>
</html>
